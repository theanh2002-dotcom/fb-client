<body class="bg-surface-base min-h-screen flex flex-col justify-center items-center p-margin-mobile md:p-margin-desktop antialiased">
<!-- Login Canvas -->
<main class="w-full max-w-[400px] bg-surface-muted border border-border-base rounded-xl shadow-ambient p-space-5 md:p-space-6 flex flex-col items-center">
<!-- Brand / Logo -->
<div class="mb-space-6 flex flex-col items-center">
<span class="font-display-lg text-display-lg text-primary tracking-tight">ezitalent</span>
<div class="h-1 w-8 bg-text-accent mt-2 rounded-full opacity-80"></div>
</div>
<!-- Title -->
<h1 class="font-display-xl text-display-xl text-text-primary mb-space-5 text-center w-full">
            Facebook Review Login
        </h1>
<!-- Form -->
<form action="#" class="w-full flex flex-col gap-space-4" method="POST" onsubmit="event.preventDefault(); alert('Demo login submitted.');">
<!-- Email Input -->
<div class="flex flex-col gap-space-1">
<label class="font-label-xs text-label-xs text-text-secondary" for="demo-email">Demo Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-space-3 top-1/2 -translate-y-1/2 text-text-secondary text-opacity-50" style="font-size: 20px;">mail</span>
<input class="w-full h-10 pl-10 pr-space-3 border border-border-base rounded-lg bg-surface-muted font-body-md text-body-md text-text-primary placeholder-text-secondary placeholder-opacity-50 focus:outline-none focus:border-text-accent focus:ring-1 focus:ring-text-accent transition-all" id="demo-email" name="demo-email" placeholder="demo@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-space-1">
<label class="font-label-xs text-label-xs text-text-secondary" for="demo-password">Demo Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-space-3 top-1/2 -translate-y-1/2 text-text-secondary text-opacity-50" style="font-size: 20px;">lock</span>
<input class="w-full h-10 pl-10 pr-space-3 border border-border-base rounded-lg bg-surface-muted font-body-md text-body-md text-text-primary placeholder-text-secondary placeholder-opacity-50 focus:outline-none focus:border-text-accent focus:ring-1 focus:ring-text-accent transition-all" id="demo-password" name="demo-password" placeholder="******" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-10 mt-space-2 bg-primary text-on-primary font-body-md text-body-md font-medium rounded-lg hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors flex items-center justify-center gap-2" type="submit">
                Login to Dashboard
                <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<!-- Informational Note -->
<p class="mt-space-5 font-body-sm text-body-sm text-text-secondary text-center opacity-80">
            This is a secure demo environment for App Review purposes only.
        </p>
</main>
<!-- Optional Footer (Positioned Absolute/Fixed to keep screen focused) -->
<footer class="absolute bottom-0 w-full flex flex-col md:flex-row justify-center items-center py-space-4 px-margin-desktop text-center md:text-left gap-space-2 md:gap-space-4">
<span class="font-label-xs text-label-xs text-text-secondary">© 2024 ezitalent. All rights reserved.</span>
</footer>
